name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/smartpantry-backend:latest ./backend

      - name: Push backend image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/smartpantry-backend:latest

      - name: Build frontend image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/smartpantry-frontend:latest ./frontend

      - name: Push frontend image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/smartpantry-frontend:latest