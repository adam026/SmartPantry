version: '3.8'

services:
  mongo:
    image: mongo:8
    ports:
      - "27017:27017"

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend