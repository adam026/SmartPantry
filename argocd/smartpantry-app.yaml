apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smartpantry
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/adam026/SmartPantry.git
    targetRevision: HEAD
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true